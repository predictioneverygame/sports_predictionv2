function calc(line, odds, stake, home, away) {
    const lineSide = document.getElementById("lineSide").value;
    const result = getPredictionResultByLine(line, home, away, lineSide);
    if (result === "hit") return stake * odds - stake;
    if (result === "half_hit") return (stake * odds - stake) / 2;
    if (result === "miss") return -stake;
    if (result === "push") return 0;
    return 0;
}

function parseDateTimeInput(dateTimeRaw) {
    if (!dateTimeRaw) return null;
    const parts = dateTimeRaw.split("T");
    if (parts.length !== 2) return null;
    const date = parts[0];
    const time = parts[1].slice(0, 5);
    if (!date || !time) return null;
    return { date, time };
}

function buildMatchId(league, date, time, home, away) {
    const raw = `${league}_${date}_${time}_${home}_${away}`.toLowerCase();
    return raw
        .replaceAll(" ", "_")
        .replaceAll(":", "")
        .replaceAll("/", "_")
        .replaceAll(".", "_");
}

function getPredictionResultByLine(line, homeScore, awayScore, lineSide) {
    let normalizedLine = String(line || "").trim().replace(/^O/i, "大").replace("大3.0", "大3");
    if (normalizedLine === "全場大球") {
        normalizedLine = "大3";
    }
    const total = homeScore + awayScore;
    if (normalizedLine === "大2.75") {
        if (total >= 4) return "hit";
        if (total === 3) return "half_hit";
        return "miss";
    }
    if (normalizedLine === "大3.25") {
        if (total >= 4) return "hit";
        if (total === 3) return "push";
        return "miss";
    }
    if (normalizedLine === "大3.75") {
        if (total >= 5) return "hit";
        if (total === 4) return "half_hit";
        return "miss";
    }
    if (normalizedLine === "大3" || normalizedLine === "大3.0") {
        if (total > 3) return "hit";
        if (total === 3) return "push";
        return "miss";
    }

    const halfOver = normalizedLine.match(/^大(\d+)\.5$/);
    if (halfOver) {
        const thr = parseFloat(halfOver[1] + ".5");
        return total > thr ? "hit" : "miss";
    }

    if (normalizedLine === "PK") {
        if (lineSide === "away") {
            if (awayScore > homeScore) return "hit";
            if (awayScore < homeScore) return "miss";
            return "push";
        }
        if (homeScore > awayScore) return "hit";
        if (homeScore < awayScore) return "miss";
        return "push";
    }

    const spread = parseFloat(normalizedLine);
    if (!isNaN(spread)) {
        const adjusted = lineSide === "away"
            ? awayScore + spread - homeScore
            : homeScore + spread - awayScore;
        if (adjusted > 0) return "hit";
        if (adjusted < 0) return "miss";
        return "push";
    }

    return "pending";
}

function getProfitByResult(result, stake, odds) {
    const s = toNum(stake) || 0;
    const o = toNum(odds) || 0;
    if (result === "hit") return s * o - s;
    if (result === "half_hit") return (s * o - s) / 2;
    if (result === "miss") return -s;
    if (result === "half_miss") return -(s / 2);
    if (result === "push") return 0;
    return 0;
}

function parseStoredLine(rawLine, sport) {
    const text = String(rawLine || "").trim().replace("大3.0", "大3");
    if (sport !== "basketball") {
        return { lineSide: "home", lineValue: text };
    }
    if (text.startsWith("主隊 ")) {
        return { lineSide: "home", lineValue: text.replace("主隊 ", "").trim() };
    }
    if (text.startsWith("客隊 ")) {
        return { lineSide: "away", lineValue: text.replace("客隊 ", "").trim() };
    }
    return { lineSide: "home", lineValue: text };
}

function formatLineText(line, lineSide, sport) {
    const normalizedLine = String(line || "").trim().replace("大3.0", "大3");
    if (sport === "basketball") {
        return `${lineSide === "home" ? "主隊" : "客隊"} ${normalizedLine}`;
    }
    return normalizedLine;
}

function fixGarbledRecommendations(list) {
    const sameTimeCounter = {};
    return (list || []).map((item) => {
        const key = `${item.date} ${item.time}`;
        sameTimeCounter[key] = (sameTimeCounter[key] || 0) + 1;
        const keyedFix = GARBLED_FIX_BY_DATE_TIME[`${key}#${sameTimeCounter[key]}`] || GARBLED_FIX_BY_DATE_TIME[key];
        if (!keyedFix) return item;
        const shouldFix =
            containsQuestionMark(item.league) ||
            containsQuestionMark(item.home) ||
            containsQuestionMark(item.away) ||
            containsQuestionMark(item.line);
        if (!shouldFix) return item;
        return {
            ...item,
            league: keyedFix.league,
            home: keyedFix.home,
            away: keyedFix.away,
            line: keyedFix.line,
            sport: keyedFix.sport
        };
    });
}

        SUPABASE_ANON_KEY !== "YOUR_SUPABASE_ANON_KEY";

    if (!supabaseReady) {
        cloudRecommendations = [];
        renderCloudRecommendations();
        setCloudStatus("尚未設定 Supabase 連線");
        return;
    }

    setCloudStatus("讀取雲端資料中...");
    try {
        const response = await fetch(
            `${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}?select=*&order=created_at.desc`,
            {
                method: "GET",
                headers: {
                    "apikey": SUPABASE_ANON_KEY,
                    "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
                }
            }
        );

        if (!response.ok) {
            const msg = await response.text();
            throw new Error(msg || "讀取失敗");
        }

        cloudRecommendations = fixGarbledRecommendations(await response.json());
        renderCloudRecommendations();
        setCloudStatus(`目前共 ${cloudRecommendations.length} 筆`);
    } catch (err) {
        console.error(err);
        setCloudStatus("讀取失敗，請檢查 Supabase 權限設定");
    }
}

function renderCloudRecommendations() {
    const cloudList = document.getElementById("cloudList");
    cloudList.innerHTML = "";

    if (!cloudRecommendations.length) {
        cloudList.innerHTML = `
        <tr>
            <td colspan="5">目前沒有雲端資料</td>
        </tr>`;
        return;
    }

    const grouped = {};
    cloudRecommendations.forEach((item) => {
        const key = getMatchGroupKey(item);
        if (!grouped[key]) {
            grouped[key] = {
                first: item,
                items: [],
                lines: []
            };
        }
        grouped[key].items.push(item);
        grouped[key].lines.push(String(item.line || "").replace("大3.0", "大3"));
    });

    Object.values(grouped).forEach((group) => {
        const item = group.first;
        const mergedLines = Array.from(new Set(group.lines)).join("/");
        cloudList.innerHTML += `
        <tr>
            <td>${item.date} ${item.time}</td>
            <td>${item.league}</td>
            <td>${item.home} vs ${item.away}</td>
            <td>${mergedLines}</td>
            <td>
              <div class="action-row">
                <button class="smallBtn" onclick="settleCloudRecommendation('${item.id}')">結算</button>
                <button class="delBtn" onclick="deleteCloudRecommendationGroup('${item.id}')">刪除</button>
              </div>
            </td>
        </tr>`;
    });
}

async function settleCloudRecommendation(id) {
    const item = cloudRecommendations.find((x) => String(x.id) === String(id));
    if (!item) {
        alert("找不到要結算的推薦資料");
        return;
    }

    const homeScoreRaw = prompt(`請輸入主隊 ${item.home} 比分`, "0");
    if (homeScoreRaw === null) return;
    const awayScoreRaw = prompt(`請輸入客隊 ${item.away} 比分`, "0");
    if (awayScoreRaw === null) return;

    const homeScore = toNum(homeScoreRaw);
    const awayScore = toNum(awayScoreRaw);
    if (homeScore === null || awayScore === null) {
        alert("賽果格式錯誤，請輸入數字");
        return;
    }

    const groupKey = getMatchGroupKey(item);
    const sameMatchItems = cloudRecommendations.filter((x) => getMatchGroupKey(x) === groupKey);
    if (!sameMatchItems.length) {
        alert("找不到同場推薦資料");
        return;
    }

    const settledRows = sameMatchItems.map((entry) => {
        const parsedLine = parseStoredLine(entry.line, entry.sport);
        const result = getPredictionResultByLine(parsedLine.lineValue, homeScore, awayScore, parsedLine.lineSide);
        const profit = getProfitByResult(result, entry.stake, entry.odds);
        return {
            line: String(entry.line || ""),
            result,
            profit,
            stake: toNum(entry.stake) || 0
        };
    });

    const totalProfit = settledRows.reduce((sum, row) => sum + row.profit, 0);
    const totalStake = settledRows.reduce((sum, row) => sum + row.stake, 0);
    const mergedLineText = settledRows.map((row) => row.line).join(" / ");
    const mergedResult = totalProfit > 0 ? "hit" : (totalProfit < 0 ? "miss" : "push");

    const row = {
        id: buildMatchId(item.league, item.date, item.time, item.home, item.away),
        date: item.date,
        time: item.time,
        league: item.league,
        sport: item.sport,
        status: "final",
        home_name: item.home,
        home_short: item.home,
        home_logo: "",
        home_score: homeScore,
        away_name: item.away,
        away_short: item.away,
        away_logo: "",
        away_score: awayScore,
        prediction_value: mergedLineText,
        prediction_result: mergedResult,
        odds: null,
        stake: totalStake,
        profit: totalProfit,
        summary: ""
    };

    try {
        const settleResponse = await fetch(
            `${SUPABASE_URL}/rest/v1/${SUPABASE_MATCHES_TABLE}?on_conflict=id`,
            {
                method: "POST",
                headers: {
                    "apikey": SUPABASE_ANON_KEY,
                    "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
                    "Content-Type": "application/json",
                    "Prefer": "resolution=merge-duplicates,return=minimal"
                },
                body: JSON.stringify([row])
            }
        );
        if (!settleResponse.ok) {
            const msg = await settleResponse.text();
            throw new Error(msg || "結算寫入失敗");
        }

        for (const entry of sameMatchItems) {
            const deleteResponse = await fetch(
                `${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}?id=eq.${encodeURIComponent(entry.id)}`,
                {
                    method: "DELETE",
                    headers: {
                        "apikey": SUPABASE_ANON_KEY,
                        "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
                    }
                }
            );
            if (!deleteResponse.ok) {
                const msg = await deleteResponse.text();
                throw new Error(msg || "已寫入戰績，但刪除推薦失敗");
            }
        }

        alert(`已結算同場 ${sameMatchItems.length} 筆，合計獲利 ${totalProfit.toFixed(2)}`);
        await loadCloudRecommendations();
        await loadCloudSettledMatches();
    } catch (err) {
        console.error(err);
        alert("結算失敗，請檢查 matches/recommendations 權限設定");
    }
}

async function addRecommendation() {
    const league = document.getElementById("league").value;
    const home = document.getElementById("home").value;
    const away = document.getElementById("away").value;
    const line = document.getElementById("line").value;
    const lineSide = document.getElementById("lineSide").value;
    const enableSecondBet = document.getElementById("enableSecondBet").checked;
    const line2 = document.getElementById("line2").value;
    const lineSide2 = document.getElementById("lineSide2").value;
    const dateTimeRaw = document.getElementById("matchDateTime").value;
    const parsedDateTime = parseDateTimeInput(dateTimeRaw);
    const odds = toNum(document.getElementById("odds").value);
    const stake = toNum(document.getElementById("stake").value);
    const odds2 = toNum(document.getElementById("odds2").value);
    const stake2 = toNum(document.getElementById("stake2").value);

    if (!parsedDateTime) {
        alert("請先填寫日期時間");
        return;
    }

    if (enableSecondBet && (odds2 === null || stake2 === null)) {
        alert("請完整填寫第二組賠率與投注金額");
        return;
    }

    const lineText = formatLineText(line, lineSide, currentSport);
    const lineText2 = formatLineText(line2, lineSide2, currentSport);

    const item = {
        league: formatLeagueName(league),
        sport: inferSportByLeague(league),
        home: home,
        away: away,
        line: lineText,
        odds: odds,
        stake: stake,
        date: parsedDateTime.date,
        time: parsedDateTime.time,
        status: "preview"
    };

    const itemsToInsert = [item];
    if (enableSecondBet) {
        itemsToInsert.push({
            ...item,
            line: lineText2,
            odds: odds2,
            stake: stake2
        });
    }

    const supabaseReady =
        SUPABASE_URL !== "YOUR_SUPABASE_URL" &&
        SUPABASE_ANON_KEY !== "YOUR_SUPABASE_ANON_KEY";

    if (!supabaseReady) {
        itemsToInsert.forEach((entry, idx) => {
            recommendations.push({
                id: "manual_" + Date.now() + "_" + idx,
                ...entry
            });
        });
        saveRecommendations();
        alert("尚未設定 Supabase，已先儲存到本機。設定完成後即可同步雲端。");
        return;
    }

    try {
        const response = await fetch(
            `${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}`,
            {
                method: "POST",
                headers: {
                    "apikey": SUPABASE_ANON_KEY,
                    "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
                    "Content-Type": "application/json",
                    "Prefer": "return=minimal"
                },
                body: JSON.stringify(itemsToInsert)
            }
        );

        if (!response.ok) {
            const msg = await response.text();
            throw new Error(msg || "Supabase 寫入失敗");
        }

        alert("已成功匯入到雲端推薦資料");
        await loadCloudRecommendations();
    } catch (err) {
        console.error(err);
        recommendations.push({
            id: "manual_" + Date.now(),
            ...item
        });
        saveRecommendations();
        alert("雲端寫入失敗，已改存本機備援。請檢查 Supabase 設定。");
    }
}

// ---------- 渲染 ----------
function render() {

    const list = document.getElementById("list");
    const totalEl = document.getElementById("total");
    if (!list || !totalEl) return;
    list.innerHTML = "";

    let total = 0;

    bets.forEach((b, i) => {

        const profit = isNaN(b.profit) ? 0 : b.profit;
        total += profit;

        list.innerHTML += `
        <tr>
            <td>${b.league}</td>
            <td>${b.home} vs ${b.away}</td>
            <td>${b.line}</td>
            <td>${b.stake}</td>
            <td>${b.homeScore}:${b.awayScore}</td>
            <td>${profit.toFixed(2)}</td>
            <td><button class="delBtn" onclick="del(${i})">X</button></td>
        </tr>`;
    });

    totalEl.innerText = "總盈虧：" + total.toFixed(2);
}

function addBet() {

    const league = document.getElementById("league").value;
    const home = document.getElementById("home").value;
    const away = document.getElementById("away").value;
    const line = document.getElementById("line").value;

    const odds = toNum(document.getElementById("odds").value);

    const profit = calc(line, odds, stake, homeScore, awayScore);

        home,

        line,
        odds,
        stake,

    save();
    render();
}

setSportFilter("basketball");
